# Дескриптор демонстрационного проекта ContextWizard.
# Все поля опциональны. Внешний инструмент здесь не задан (в MVP плагинов нет),
# поэтому конвейер работает на глобальных vars + опроснике + файлах.

vars_storage = "vars.json"
plugins_dir = "plugins"

[answer_target]
# Приёмник не установлен как плагин — промпт уйдёт в stdout/файл (fallback).
# use_fs = false заставил бы вставлять файлы по имени, без inline.
id = "stdout"
use_fs = true
